<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 2 - Promise Chain</title>
    <style>body { font-family: Inter; padding: 40px; }</style>
</head>
<body>
    <h1>Day 2: Promise Chain</h1>
    <button onclick="runChain()">Run Promise Chain</button>

    <script>
        function step1() {
            return new Promise(resolve => {
                setTimeout(() => {
                    console.log("Step 1 completed");
                    resolve("Data from Step 1");
                }, 1000);
            });
        }

        function step2(data) {
            return new Promise(resolve => {
                setTimeout(() => {
                    console.log("Step 2 completed with:", data);
                    resolve("Final Result");
                }, 800);
            });
        }

        async function runChain() {
            console.log("Starting chain...");
            const result1 = await step1();
            const result2 = await step2(result1);
            console.log("✅ Chain completed:", result2);
        }
    </script>
</body>
</html>
