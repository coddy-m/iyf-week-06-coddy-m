<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 1 - Delay Promise</title>
    <style>body { font-family: Inter; padding: 40px; }</style>
</head>
<body>
    <h1>Day 1: Delay Promise</h1>
    <button onclick="testDelay()">Test Delay (2 seconds)</button>

    <script>
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function testDelay() {
            console.log("Starting delay...");
            await delay(2000);
            console.log("✅ 2 seconds have passed!");
            alert("Delay completed after 2 seconds!");
        }
    </script>
</body>
</html>
