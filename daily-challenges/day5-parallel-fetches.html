<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 5 - Parallel Fetches</title>
    <style>body { font-family: Inter; padding: 40px; }</style>
</head>
<body>
    <h1>Day 5: Parallel Fetches</h1>
    <button onclick="fetchInParallel()">Fetch 3 APIs in Parallel</button>

    <script>
        async function fetchInParallel() {
            console.log("Fetching 3 APIs in parallel...");

            const [users, posts, comments] = await Promise.all([
                fetch("https://jsonplaceholder.typicode.com/users").then(r => r.json()),
                fetch("https://jsonplaceholder.typicode.com/posts").then(r => r.json()),
                fetch("https://jsonplaceholder.typicode.com/comments").then(r => r.json())
            ]);

            console.log(`Users: ${users.length}, Posts: ${posts.length}, Comments: ${comments.length}`);
            console.log("%c✅ All fetches completed in parallel!", "color: green");
        }
    </script>
</body>
</html>
