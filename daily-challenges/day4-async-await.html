<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 - Rewrite with Async/Await</title>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            padding: 40px;
            background: #f8fafc;
            line-height: 1.6;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 20px auto;
        }
        button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #2563eb;
        }
        pre {
            background: #1e2937;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
        }
        .output {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Day 4: Rewrite Callback Hell with Async/Await</h1>
        <p><strong>Task:</strong> Convert the nested callback version into clean async/await code.</p>
        
        <button onclick="runCallbackHell()">1. Run Callback Hell (Old Way)</button>
        <button onclick="runAsyncAwait()">2. Run Async/Await (Modern Way)</button>

        <div class="output" id="output"></div>
    </div>

    <script>
        // Mock functions that return data after delay (simulating API calls)
        function getUserData(userId) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve({
                        id: userId,
                        name: "Michelle",
                        city: "Nairobi"
                    });
                }, 1000);
            });
        }

        function getUserPosts(userId) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve([
                        { id: 101, title: "My Journey in Web Development" },
                        { id: 102, title: "Learning Asynchronous JavaScript" }
                    ]);
                }, 800);
            });
        }

        function getPostComments(postId) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve([
                        { id: 1, text: "This is very helpful!" },
                        { id: 2, text: "Great explanation of async/await" }
                    ]);
                }, 700);
            });
        }

        // ==================== CALLBACK HELL (Old & Messy) ====================
        function runCallbackHell() {
            const output = document.getElementById("output");
            output.innerHTML = "<strong>Running Callback Hell...</strong><br>";

            getUserData(1, function(user) {
                output.innerHTML += `User: ${user.name}<br>`;
                
                getUserPosts(user.id, function(posts) {
                    output.innerHTML += `Found ${posts.length} posts<br>`;
                    
                    getPostComments(posts[0].id, function(comments) {
                        output.innerHTML += `Found ${comments.length} comments<br>`;
                        output.innerHTML += "<br><strong style='color: red;'>✅ Callback Hell Completed (but very messy!)</strong>";
                    });
                });
            });
        }

        // ==================== ASYNC/AWAIT (Clean & Modern) ====================
        async function runAsyncAwait() {
            const output = document.getElementById("output");
            output.innerHTML = "<strong>Running with Async/Await...</strong><br>";

            try {
                // Clean, readable code
                const user = await getUserData(1);
                output.innerHTML += `User: ${user.name}<br>`;

                const posts = await getUserPosts(user.id);
                output.innerHTML += `Found ${posts.length} posts<br>`;

                const comments = await getPostComments(posts[0].id);
                output.innerHTML += `Found ${comments.length} comments<br>`;

                output.innerHTML += "<br><strong style='color: green;'>✅ Async/Await Completed Successfully!</strong>";

            } catch (error) {
                output.innerHTML += `<br><strong style='color: red;'>Error: ${error.message}</strong>`;
            }
        }

        // Bonus: Show comparison
        console.log("%cDay 4 Ready: Compare Callback Hell vs Async/Await", "color: #3b82f6; font-size: 16px");
    </script>
</body>
</html>
