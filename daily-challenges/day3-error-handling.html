<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 3 - Error Handling</title>
    <style>body { font-family: Inter; padding: 40px; }</style>
</head>
<body>
    <h1>Day 3: Error Handling with Fetch</h1>
    <button onclick="fetchUser(1)">Fetch Valid User</button>
    <button onclick="fetchUser(9999)">Fetch Invalid User</button>

    <script>
        async function fetchUser(id) {
            try {
                const res = await fetch(`https://jsonplaceholder.typicode.com/users/${id}`);
                
                if (!res.ok) {
                    throw new Error(`User ${id} not found`);
                }
                
                const user = await res.json();
                console.log("User found:", user.name);
            } catch (error) {
                console.log("Handled Error:", error.message);
            }
        }
    </script>
</body>
</html>
