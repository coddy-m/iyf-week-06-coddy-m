<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.3 - POST Request</title>
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px; background: #f8fafc; }
        .card { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Exercise 12.3: POST Request (Create Post)</h1>
        
        <input type="text" id="title" placeholder="Post Title" value="My Awesome Post">
        <textarea id="body" rows="4" placeholder="Post Content">This is the body of my new post created using fetch POST.</textarea>
        
        <button onclick="createNewPost()">Create Post (POST Request)</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        async function createNewPost() {
            const title = document.getElementById("title").value;
            const body = document.getElementById("body").value;
            const resultDiv = document.getElementById("result");

            resultDiv.innerHTML = "Sending POST request...";

            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/posts", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        title: title,
                        body: body,
                        userId: 1
                    })
                });

                if (!response.ok) {
                    throw new Error("Failed to create post");
                }

                const newPost = await response.json();

                resultDiv.innerHTML = `
                    <strong>✅ Post Created Successfully!</strong><br><br>
                    <strong>ID:</strong> ${newPost.id}<br>
                    <strong>Title:</strong> ${newPost.title}<br>
                    <strong>Body:</strong> ${newPost.body}<br>
                    <strong>User ID:</strong> ${newPost.userId}
                `;

                console.log("Created Post:", newPost);

            } catch (error) {
                resultDiv.innerHTML = `<strong style="color:red">Error: ${error.message}</strong>`;
            }
        }
    </script>
</body>
</html>
