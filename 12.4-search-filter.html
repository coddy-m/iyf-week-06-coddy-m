<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.4 - Search & Filter</title>
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px; background: #f8fafc; }
        .card { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }
        input, select {
            padding: 12px;
            margin: 10px 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .user-card {
            border: 1px solid #e2e8f0;
            padding: 18px;
            border-radius: 10px;
            background: #fff;
        }
        button {
            padding: 10px 18px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Exercise 12.4: Live Search & Filter</h1>
        
        <div>
            <input type="text" id="searchInput" placeholder="Search by name or email..." onkeyup="filterUsers()">
            <select id="cityFilter" onchange="filterUsers()">
                <option value="">All Cities</option>
            </select>
            <select id="sortSelect" onchange="filterUsers()">
                <option value="name-asc">Sort by Name (A-Z)</option>
                <option value="name-desc">Sort by Name (Z-A)</option>
            </select>
        </div>

        <div id="userGrid" class="user-grid"></div>
    </div>

    <script>
        let allUsers = [];

        // Fetch users once
        async function fetchUsers() {
            try {
                const res = await fetch("https://jsonplaceholder.typicode.com/users");
                allUsers = await res.json();
                populateCityFilter();
                displayUsers(allUsers);
            } catch (err) {
                console.error("Failed to fetch users:", err);
            }
        }

        // Populate city dropdown
        function populateCityFilter() {
            const cities = [...new Set(allUsers.map(user => user.address.city))].sort();
            const select = document.getElementById("cityFilter");
            
            cities.forEach(city => {
                const option = document.createElement("option");
                option.value = city;
                option.textContent = city;
                select.appendChild(option);
            });
        }

        // Display users
        function displayUsers(users) {
            const grid = document.getElementById("userGrid");
            grid.innerHTML = users.map(user => `
                <div class="user-card">
                    <h3>${user.name}</h3>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>City:</strong> ${user.address.city}</p>
                    <p><strong>Company:</strong> ${user.company.name}</p>
                </div>
            `).join("");
        }

        // Main filter function
        function filterUsers() {
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            const selectedCity = document.getElementById("cityFilter").value;
            const sortOption = document.getElementById("sortSelect").value;

            let filtered = allUsers.filter(user => {
                const matchesSearch = 
                    user.name.toLowerCase().includes(searchTerm) ||
                    user.email.toLowerCase().includes(searchTerm);
                
                const matchesCity = !selectedCity || user.address.city === selectedCity;
                
                return matchesSearch && matchesCity;
            });

            // Sorting
            if (sortOption === "name-asc") {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortOption === "name-desc") {
                filtered.sort((a, b) => b.name.localeCompare(a.name));
            }

            displayUsers(filtered);
        }

        // Initialize
        fetchUsers();
    </script>
</body>
</html>
