<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 6 - All Exercises (Except 12.3 & 12.4)</title>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            padding: 40px;
            line-height: 1.6;
        }
        h1 { color: #1e40af; text-align: center; margin-bottom: 40px; }
        .section {
            background: white;
            margin: 25px 0;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        button {
            padding: 12px 20px;
            margin: 8px 6px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background: #2563eb;
        }
        .output {
            margin-top: 15px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            min-height: 80px;
        }
        .note {
            font-size: 0.95rem;
            color: #64748b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Week 6 - Asynchronous JavaScript Exercises</h1>
    <p style="text-align:center; color:#64748b;">Check the Console (F12) for detailed output</p>

    <!-- Task 11.1 -->
    <div class="section">
        <h2>Task 11.1: Synchronous vs Asynchronous</h2>
        <button onclick="task11_1()">Run Sync vs Async Demo</button>
        <div class="output" id="output11_1"></div>
        <p class="note">Observe the order of console logs.</p>
    </div>

    <!-- Task 11.2 & 11.3 -->
    <div class="section">
        <h2>Task 11.2 & 11.3: Promises & Promise Chaining</h2>
        <button onclick="task11_2_3()">Run Promise Chain Demo</button>
        <div class="output" id="output11_2_3"></div>
    </div>

    <!-- Task 11.4 -->
    <div class="section">
        <h2>Task 11.4: Async/Await</h2>
        <button onclick="task11_4()">Run Async/Await Demo</button>
        <div class="output" id="output11_4"></div>
    </div>

    <!-- Task 12.1 & 12.2 -->
    <div class="section">
        <h2>Task 12.1 & 12.2: Fetch API + Display Data</h2>
        <button onclick="fetchSingleUser()">Fetch Single User</button>
        <button onclick="fetchAllUsers()">Fetch All Users & Display</button>
        <div id="usersContainer"></div>
    </div>

    <script>
        // ====================== TASK 11.1 ======================
        function task11_1() {
            console.clear();
            const output = document.getElementById("output11_1");
            output.innerHTML = "Running... Check Console (F12)";

            console.log("%c=== Task 11.1: Synchronous vs Asynchronous ===", "color: #3b82f6; font-size: 16px");
            
            console.log("1. Start");
            
            setTimeout(() => console.log("2. This runs after 0ms (but still async)"), 0);
            setTimeout(() => console.log("3. This runs after 100ms"), 100);
            
            console.log("4. Middle");
            console.log("5. End");

            console.log("%cOutput Order: 1 → 4 → 5 → 2 → 3", "color: green");
        }

        // ====================== TASK 11.2 & 11.3 ======================
        async function task11_2_3() {
            console.clear();
            const output = document.getElementById("output11_2_3");
            output.innerHTML = "Running Promise Chain... Check Console";

            try {
                console.log("%c=== Task 11.2 & 11.3: Promises & Chaining ===", "color: #3b82f6");

                // Simulate API calls
                const user = await new Promise(r => setTimeout(() => r({id: 1, name: "Michelle"}), 800));
                console.log("User fetched:", user);

                const posts = await new Promise(r => setTimeout(() => r(["Post 1", "Post 2"]), 600));
                console.log("Posts fetched:", posts);

                const comments = await new Promise(r => setTimeout(() => r(["Great!", "Thanks"]), 500));
                console.log("Comments fetched:", comments);

                console.log("%c✅ Promise Chain Completed Successfully!", "color: green");
            } catch (err) {
                console.error("Error:", err);
            }
        }

        // ====================== TASK 11.4 ======================
        async function task11_4() {
            console.clear();
            const output = document.getElementById("output11_4");
            output.innerHTML = "Running Async/Await... Check Console";

            try {
                console.log("%c=== Task 11.4: Async/Await ===", "color: #3b82f6");

                const user = await new Promise(r => setTimeout(() => r({name: "Michelle", city: "Nairobi"}), 1000));
                console.log("1. User loaded:", user);

                const posts = await new Promise(r => setTimeout(() => r(["Learning JS", "Building Apps"]), 700));
                console.log("2. Posts loaded:", posts);

                console.log("%c✅ Async/Await makes asynchronous code look clean and synchronous!", "color: green");
            } catch (error) {
                console.error("Error in async/await:", error);
            }
        }

        // ====================== TASK 12.1 & 12.2 ======================
        async function fetchSingleUser() {
            console.clear();
            console.log("%cFetching single user...", "color: #3b82f6");
            try {
                const res = await fetch("https://jsonplaceholder.typicode.com/users/1");
                const user = await res.json();
                console.log("Single User:", user);
                alert(`User: ${user.name}\nEmail: ${user.email}`);
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        async function fetchAllUsers() {
            const container = document.getElementById("usersContainer");
            container.innerHTML = "<p>Loading users...</p>";

            try {
                const res = await fetch("https://jsonplaceholder.typicode.com/users");
                const users = await res.json();

                let html = "<h3>All Users (" + users.length + ")</h3>";
                html += users.map(user => `
                    <div style="border:1px solid #ddd; padding:12px; margin:8px 0; border-radius:8px;">
                        <strong>${user.name}</strong><br>
                        ${user.email} | ${user.address.city}
                    </div>
                `).join("");

                container.innerHTML = html;
                console.log("%c✅ All users loaded and displayed!", "color: green");
            } catch (err) {
                container.innerHTML = `<p style="color:red">Error loading users: ${err.message}</p>`;
            }
        }

        console.log("%cWeek 6 Exercises Loaded Successfully! Click any button above.", "color: #3b82f6; font-size: 16px");
    </script>
</body>
</html>
