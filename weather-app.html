<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            background: #f8fafc;
        }

        .weather-app {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: all 0.8s ease;
        }

        h1 {
            text-align: center;
            padding: 30px 20px;
            background: #667eea;
            color: white;
            font-size: 2.2rem;
        }

        #search-form {
            padding: 25px;
            display: flex;
            gap: 12px;
            background: #f8f9fa;
        }

        #city-input {
            flex: 1;
            padding: 16px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
        }

        #city-input:focus { border-color: #667eea; }

        #search-form button {
            padding: 0 32px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        #loading, #error {
            text-align: center;
            padding: 20px;
            font-size: 1.1rem;
        }

        .error { color: #ef4444; background: #fee2e2; }

        #weather-display {
            padding: 30px;
        }

        .weather-main {
            text-align: center;
            margin-bottom: 30px;
        }

        #city-name { font-size: 2rem; margin-bottom: 10px; }
        #weather-icon { width: 120px; height: 120px; margin: 10px 0; }
        #temperature { font-size: 3.5rem; font-weight: 700; margin: 10px 0; }
        #description { font-size: 1.3rem; color: #64748b; text-transform: capitalize; }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .detail {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .detail span:first-child {
            display: block;
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 5px;
        }

        .detail span:last-child {
            font-size: 1.4rem;
            font-weight: 600;
        }

        /* 5-Day Forecast */
        #forecast {
            margin-top: 40px;
        }

        #forecast h3 {
            margin-bottom: 15px;
            color: #64748b;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
        }

        .forecast-day {
            background: #f8f9fa;
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
        }

        .forecast-day img {
            width: 50px;
            height: 50px;
        }

        .forecast-day .day-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .forecast-day .temp {
            font-size: 1.2rem;
            font-weight: 700;
        }

        #recent-searches {
            padding: 20px 30px 30px;
            background: #f8f9fa;
        }

        #recent-searches h3 {
            margin-bottom: 15px;
            color: #64748b;
        }

        #search-history {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        #search-history li {
            background: white;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            transition: 0.3s;
        }

        #search-history li:hover {
            background: #667eea;
            color: white;
        }

        .hidden { display: none !important; }

        /* Dynamic Backgrounds */
        .sunny { background: linear-gradient(135deg, #facc15 0%, #f59e0b 100%); }
        .clear { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); }
        .cloudy { background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%); }
        .rainy { background: linear-gradient(135deg, #64748b 0%, #334155 100%); }
        .thunderstorm { background: linear-gradient(135deg, #1e2937 0%, #0f172a 100%); }
        .snowy { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); }
        .misty { background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%); }

        .rainy h1, .thunderstorm h1,
        .rainy .weather-main, .thunderstorm .weather-main {
            color: white;
        }
    </style>
</head>
<body>
    <div class="weather-app">
        <h1>🌤️ Weather Dashboard</h1>
        
        <form id="search-form">
            <input 
                type="text" 
                id="city-input" 
                placeholder="Enter city name (e.g. Nairobi)"
                required
            >
            <button type="submit">Search</button>
        </form>

        <div id="loading" class="hidden">Loading weather data...</div>
        <div id="error" class="hidden error"></div>
        
        <div id="weather-display" class="hidden">
            <div class="weather-main">
                <h2 id="city-name"></h2>
                <img id="weather-icon" src="" alt="Weather icon">
                <p id="temperature"></p>
                <p id="description"></p>
            </div>
            
            <div class="weather-details">
                <div class="detail">
                    <span>Feels Like</span>
                    <span id="feels-like"></span>
                </div>
                <div class="detail">
                    <span>Humidity</span>
                    <span id="humidity"></span>
                </div>
                <div class="detail">
                    <span>Wind Speed</span>
                    <span id="wind"></span>
                </div>
                <div class="detail">
                    <span>Pressure</span>
                    <span id="pressure"></span>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <div id="forecast">
                <h3>5-Day Forecast</h3>
                <div id="forecast-grid" class="forecast-grid"></div>
            </div>
        </div>

        <div id="recent-searches">
            <h3>Recent Searches</h3>
            <ul id="search-history"></ul>
        </div>
    </div>

    <script>
        const API_KEY = "YOUR_API_KEY_HERE";   // ← REPLACE WITH YOUR ACTUAL API KEY
        const BASE_URL = "https://api.openweathermap.org/data/2.5/weather";
        const FORECAST_URL = "https://api.openweathermap.org/data/2.5/forecast";

        const form = document.getElementById("search-form");
        const cityInput = document.getElementById("city-input");
        const loading = document.getElementById("loading");
        const errorDiv = document.getElementById("error");
        const weatherDisplay = document.getElementById("weather-display");
        const weatherApp = document.querySelector(".weather-app");

        const cityName = document.getElementById("city-name");
        const weatherIcon = document.getElementById("weather-icon");
        const temperature = document.getElementById("temperature");
        const description = document.getElementById("description");
        const feelsLike = document.getElementById("feels-like");
        const humidity = document.getElementById("humidity");
        const wind = document.getElementById("wind");
        const pressure = document.getElementById("pressure");

        const forecastGrid = document.getElementById("forecast-grid");
        const searchHistoryList = document.getElementById("search-history");

        let searchHistory = JSON.parse(localStorage.getItem("weatherHistory")) || [];

        function renderHistory() {
            searchHistoryList.innerHTML = "";
            searchHistory.forEach(city => {
                const li = document.createElement("li");
                li.textContent = city;
                li.onclick = () => getWeather(city);
                searchHistoryList.appendChild(li);
            });
        }

        function saveToHistory(city) {
            if (!searchHistory.includes(city)) {
                searchHistory.unshift(city);
                if (searchHistory.length > 5) searchHistory.pop();
                localStorage.setItem("weatherHistory", JSON.stringify(searchHistory));
                renderHistory();
            }
        }

        function showLoading() {
            loading.classList.remove("hidden");
            weatherDisplay.classList.add("hidden");
            errorDiv.classList.add("hidden");
        }

        function hideLoading() {
            loading.classList.add("hidden");
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.remove("hidden");
            weatherDisplay.classList.add("hidden");
        }

        function setWeatherBackground(mainWeather) {
            weatherApp.classList.remove('sunny', 'clear', 'cloudy', 'rainy', 'thunderstorm', 'snowy', 'misty');
            
            const condition = mainWeather.toLowerCase();
            if (condition.includes('clear') || condition.includes('sunny')) weatherApp.classList.add('sunny');
            else if (condition.includes('cloud')) weatherApp.classList.add('cloudy');
            else if (condition.includes('rain')) weatherApp.classList.add('rainy');
            else if (condition.includes('thunderstorm')) weatherApp.classList.add('thunderstorm');
            else if (condition.includes('snow')) weatherApp.classList.add('snowy');
            else if (condition.includes('mist') || condition.includes('fog')) weatherApp.classList.add('misty');
            else weatherApp.classList.add('clear');
        }

        // ==================== 5-DAY FORECAST ====================
        async function getForecast(city) {
            try {
                const url = `${FORECAST_URL}?q=${city}&appid=${API_KEY}&units=metric`;
                const response = await fetch(url);
                const data = await response.json();

                forecastGrid.innerHTML = "";

                // Group by day (take one forecast per day)
                const dailyForecast = data.list.filter((item, index) => index % 8 === 0).slice(0, 5);

                dailyForecast.forEach(day => {
                    const date = new Date(day.dt * 1000);
                    const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });

                    const div = document.createElement("div");
                    div.className = "forecast-day";
                    div.innerHTML = `
                        <div class="day-name">${dayName}</div>
                        <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}.png" alt="icon">
                        <div class="temp">${Math.round(day.main.temp)}°C</div>
                        <small>${day.weather[0].description}</small>
                    `;
                    forecastGrid.appendChild(div);
                });
            } catch (err) {
                console.error("Forecast fetch failed:", err);
            }
        }

        // ==================== MAIN WEATHER FUNCTION ====================
        async function getWeather(city) {
            if (!API_KEY || API_KEY === "6e3d6a1edfe2a626a7216cbf3d7d9442") {
                showError("Please replace YOUR_API_KEY_HERE with your actual OpenWeatherMap API key.");
                return;
            }

            const url = `${BASE_URL}?q=${city}&appid=${API_KEY}&units=metric`;

            try {
                showLoading();

                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) throw new Error("City not found.");
                    throw new Error("Failed to fetch weather data");
                }

                const data = await response.json();

                // Current Weather
                cityName.textContent = `${data.name}, ${data.sys.country}`;
                weatherIcon.src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
                temperature.textContent = `${Math.round(data.main.temp)}°C`;
                description.textContent = data.weather[0].description;
                feelsLike.textContent = `${Math.round(data.main.feels_like)}°C`;
                humidity.textContent = `${data.main.humidity}%`;
                wind.textContent = `${data.wind.speed} m/s`;
                pressure.textContent = `${data.main.pressure} hPa`;

                setWeatherBackground(data.weather[0].main);

                weatherDisplay.classList.remove("hidden");

                // Fetch 5-day forecast
                getForecast(city);

                saveToHistory(city);

            } catch (err) {
                showError(err.message);
            } finally {
                hideLoading();
            }
        }

        // Event Listener
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const city = cityInput.value.trim();
            if (city) {
                getWeather(city);
                cityInput.value = "";
            }
        });

        // Initialize
        renderHistory();
        getWeather("Nairobi");   // Default city
    </script>
</body>
</html>
